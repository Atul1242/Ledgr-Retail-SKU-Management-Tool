{% extends "base.html" %}
{% block title %}Outlets{% endblock %}
{% block content %}
<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
  <h2 style="margin:0;font-size:22px;font-weight:700">Outlet Network</h2>
  <div style="display:flex;align-items:center;gap:8px">
    <span class="text-muted" id="outlet-meta" style="font-size:12px">—</span>
  </div>
</div>

<!-- Toolbar -->
<div class="df-toolbar">
  <select class="df-btn-outline" style="padding:6px 12px;cursor:pointer" id="channel-filter" onchange="applyFilters()">
    <option value="">All Channels</option>
    <option value="kirana">Kirana</option>
    <option value="supermarket">Supermarket</option>
    <option value="medical">Medical</option>
  </select>
  <select class="df-btn-outline" style="padding:6px 12px;cursor:pointer" id="city-filter" onchange="applyFilters()">
    <option value="">All Cities</option>
  </select>
  <input type="text" class="df-btn-outline" style="padding:6px 12px" placeholder="Search by ID or area..." id="search-input" oninput="applyFilters()">
  <div style="flex:1"></div>
  <button class="df-btn-outline" id="btn-export" onclick="exportCSV()"><i class="ti ti-download"></i>Export CSV</button>
</div>

<!-- Channel summary cards -->
<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px" id="channel-cards"></div>

<!-- Table -->
<div class="df-card">
  <div style="overflow-x:auto">
    <table class="df-table" id="outlets-table">
      <thead><tr>
        <th>Outlet ID</th><th>Channel</th><th>City</th><th>Area</th>
        <th>Avg Weekly Units (8w)</th>
      </tr></thead>
      <tbody id="outlets-tbody">
        <tr><td colspan="5" style="text-align:center;padding:24px;color:#94A3B8">Loading outlets...</td></tr>
      </tbody>
    </table>
  </div>
  <div class="df-pagination">
    <span id="page-info">—</span>
    <div class="df-pagination-btns">
      <button id="prev-btn" onclick="changePage(-1)"><i class="ti ti-chevron-left"></i> Prev</button>
      <span id="page-num" style="padding:0 12px">1</span>
      <button id="next-btn" onclick="changePage(1)">Next <i class="ti ti-chevron-right"></i></button>
    </div>
  </div>
</div>

<!-- Right Panel: Outlet detail with real per-outlet sales chart -->
<aside class="df-right-panel" id="outlet-panel">
  <div class="df-right-panel-header">
    <h4 id="op-title">Outlet Insights</h4>
    <button class="df-right-panel-close" onclick="closeOutletPanel()"><i class="ti ti-x"></i></button>
  </div>
  <div class="df-right-panel-body">
    <div style="font-size:12px;color:#64748B;margin-bottom:12px" id="op-subtitle">—</div>
    <div style="font-size:13px;font-weight:600;margin-bottom:8px">Weekly Units (last 12 weeks)</div>
    <canvas id="op-chart" height="120"></canvas>
    <div id="op-details" style="font-size:13px;color:#475569;margin-top:12px;line-height:1.7"></div>
  </div>
</aside>
{% endblock %}

{% block scripts %}
<script>
let allOutlets = [];
let view = [];
const PAGE_SIZE = 20;
let page = 1;
let currentSalesData = null;

async function loadOutlets() {
  try {
    const res = await fetch('/api/outlets');
    const data = await res.json();
    allOutlets = Array.isArray(data) ? data : [];
    populateCityFilter();
    renderChannelCards();
    applyFilters();
  } catch (err) {
    document.getElementById('outlets-tbody').innerHTML =
      '<tr><td colspan="5" style="text-align:center;padding:24px;color:#d63939">Failed to load outlets.</td></tr>';
  }
}

function populateCityFilter() {
  const cities = [...new Set(allOutlets.map(o => o.city).filter(Boolean))].sort();
  const sel = document.getElementById('city-filter');
  sel.innerHTML = '<option value="">All Cities</option>' + cities.map(c => `<option value="${c}">${c}</option>`).join('');
}

function renderChannelCards() {
  const total = allOutlets.length;
  const counts = {kirana: 0, supermarket: 0, medical: 0, other: 0};
  allOutlets.forEach(o => {
    const ch = (o.channel || '').toLowerCase();
    if (counts[ch] !== undefined) counts[ch]++;
    else counts.other++;
  });
  const card = (label, n, color) =>
    `<div class="df-card"><div class="df-card-body" style="padding:14px">
       <div class="df-kpi-label">${label}</div>
       <div class="df-kpi-value" style="font-size:22px;color:${color}">${n}</div>
       <div style="font-size:11px;color:#94A3B8">${total ? ((n/total*100).toFixed(0)) : 0}% of network</div>
     </div></div>`;
  document.getElementById('channel-cards').innerHTML = [
    card('Total Outlets', total, '#1E293B'),
    card('Kirana', counts.kirana, '#3B82F6'),
    card('Supermarket', counts.supermarket, '#22C55E'),
    card('Medical', counts.medical, '#8B5CF6'),
  ].join('');
}

function applyFilters() {
  const ch = document.getElementById('channel-filter').value;
  const city = document.getElementById('city-filter').value;
  const q = (document.getElementById('search-input').value || '').toLowerCase().trim();
  view = allOutlets.filter(o => {
    if (ch && (o.channel || '').toLowerCase() !== ch) return false;
    if (city && o.city !== city) return false;
    if (q && !(o.outlet_id.toLowerCase().includes(q) || (o.area||'').toLowerCase().includes(q))) return false;
    return true;
  });
  page = 1;
  render();
}

function render() {
  const start = (page - 1) * PAGE_SIZE;
  const slice = view.slice(start, start + PAGE_SIZE);
  const tbody = document.getElementById('outlets-tbody');
  if (!view.length) {
    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:24px;color:#94A3B8">No outlets match the current filters.</td></tr>';
  } else {
    tbody.innerHTML = slice.map(o => {
      const chBadge = badgeFor(o.channel);
      return `<tr onclick="selectOutlet('${o.outlet_id}', this)" style="cursor:pointer">
        <td style="font-weight:600;color:#3B82F6">${o.outlet_id}</td>
        <td>${chBadge}</td>
        <td>${o.city || '—'}</td>
        <td>${o.area || '—'}</td>
        <td>${o.weekly_units ? o.weekly_units.toLocaleString('en-IN') + ' units' : '—'}</td>
      </tr>`;
    }).join('');
  }
  document.getElementById('outlet-meta').textContent = `Showing ${view.length ? start+1 : 0}–${Math.min(start+PAGE_SIZE, view.length)} of ${view.length}`;
  document.getElementById('page-info').textContent = `${view.length} outlets`;
  document.getElementById('page-num').textContent = page;
  document.getElementById('prev-btn').disabled = page === 1;
  document.getElementById('next-btn').disabled = (start + PAGE_SIZE) >= view.length;
}

function badgeFor(ch) {
  const c = (ch||'').toLowerCase();
  const colors = {
    kirana: 'background:#DBEAFE;color:#1D4ED8',
    supermarket: 'background:#DCFCE7;color:#15803D',
    medical: 'background:#EDE9FE;color:#5B21B6',
  };
  const style = colors[c] || 'background:#F1F5F9;color:#64748B';
  return `<span class="df-flag" style="${style}">${ch || '—'}</span>`;
}

function changePage(d) {
  const nextPage = page + d;
  const maxPage = Math.max(1, Math.ceil(view.length / PAGE_SIZE));
  if (nextPage < 1 || nextPage > maxPage) return;
  page = nextPage;
  render();
}

let opChart = null;
async function selectOutlet(id, tr) {
  document.querySelectorAll('.df-table tbody tr').forEach(r => r.classList.remove('selected'));
  if (tr) tr.classList.add('selected');
  const o = allOutlets.find(x => x.outlet_id === id);
  if (!o) return;
  document.getElementById('op-title').textContent = id;
  document.getElementById('op-subtitle').textContent = `${o.area || '—'}, ${o.city || '—'} · ${o.channel || '—'}`;
  document.getElementById('op-details').innerHTML = `
    <p><strong>Channel:</strong> ${o.channel || '—'}</p>
    <p><strong>Avg weekly units (last 8w):</strong> ${o.weekly_units ? o.weekly_units.toLocaleString('en-IN') : '—'}</p>
    <p style="font-size:11px;color:#94A3B8;margin-top:8px"><i class="ti ti-info-circle me-1"></i>Per-outlet weekly chart aggregated from sales_classified.csv when available.</p>
  `;
  document.getElementById('outlet-panel').classList.add('open');
  document.querySelector('.df-main').classList.add('panel-open');
  if (opChart) { opChart.destroy(); opChart = null; }
  // Try to fetch real per-outlet weekly trace; if /api/outlet-sales/<id> isn't
  // wired we just leave the placeholder.
  try {
    const r = await fetch('/api/outlet-sales/' + encodeURIComponent(id));
    if (!r.ok) throw new Error('endpoint missing');
    const d = await r.json();
    if (Array.isArray(d) && d.length) {
      const tail = d.slice(-12);
      opChart = new Chart(document.getElementById('op-chart'), {
        type: 'line',
        data: {
          labels: tail.map(x => x.week_start_date.slice(5)),
          datasets: [{data: tail.map(x => x.units_sold), borderColor: '#3B82F6', backgroundColor: 'rgba(59,130,246,0.08)', borderWidth: 2, fill: true, tension: 0.4, pointRadius: 2}]
        },
        options: {responsive: true, plugins: {legend: {display: false}}, scales: {x: {grid: {display: false}, ticks: {font: {size: 9}}}, y: {grid: {color: '#E2E8F0'}, ticks: {font: {size: 9}}}}}
      });
    }
  } catch (e) { /* graceful: no per-outlet endpoint yet */ }
}

function closeOutletPanel() {
  document.getElementById('outlet-panel').classList.remove('open');
  document.querySelector('.df-main').classList.remove('panel-open');
}

function exportCSV() {
  if (!view.length) return;
  const headers = ['outlet_id', 'channel', 'city', 'area', 'weekly_units'];
  const lines = [headers.join(',')];
  view.forEach(o => lines.push(headers.map(h => (o[h] ?? '')).join(',')));
  const blob = new Blob([lines.join('\n')], {type: 'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'outlets_' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
  URL.revokeObjectURL(url);
}

loadOutlets();
</script>
{% endblock %}
